name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  # 手動実行も可能
  workflow_dispatch:

# GitHub Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つだけ許可（進行中のデプロイはキャンセルせず待機）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────
  # 1. ビルド
  # ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub Pages の公開 URL は
      # https://<USER>.github.io/<REPO>/ となるため
      # リポジトリ名を base パスとして渡す
      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # dist/ を Pages 用アーティファクトとしてアップロード
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ──────────────────────────────────────────
  # 2. デプロイ
  # ──────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
